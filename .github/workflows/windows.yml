name: Build Windows app

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --name lj-discounts --clean run.py
          Copy-Item -LiteralPath windows\run-lj-discounts.cmd -Destination dist\run-lj-discounts.cmd
          Copy-Item -LiteralPath README.md -Destination dist\README.md

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath lj-discounts-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lj-discounts-windows
          path: lj-discounts-windows.zip

      - name: Attach zip to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lj-discounts-windows.zip
