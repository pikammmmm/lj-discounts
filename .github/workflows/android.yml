name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Android build tools (Debian packages)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            android-sdk-build-tools \
            android-sdk-platform-23 \
            smali \
            default-jdk-headless \
            zip

      - name: Build APK
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'ljdiscounts' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'ljdiscounts' }}
        run: ./android/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lj-discounts-apk
          path: download/lj-discounts.apk

      - name: Commit refreshed APK back to default branch
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add download/lj-discounts.apk
          if git diff --cached --quiet; then
            echo "APK byte-identical, nothing to commit."
          else
            git commit -m "build: refresh download/lj-discounts.apk [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi

      - name: Attach APK to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: download/lj-discounts.apk
